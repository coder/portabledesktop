name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  BUN_VERSION: "1.3.2"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate tag matches package version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"

          if [[ "${tag_version}" != "${package_version}" ]]; then
            echo "error: tag version (${tag_version}) does not match package.json version (${package_version})" >&2
            exit 1
          fi

          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

  publish-npm:
    runs-on: ubuntu-latest
    needs:
      - validate-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node (npm auth)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  build-release-artifacts:
    needs:
      - validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build.sh --package build

      - name: Build standalone CLI binary
        run: bun run build:binary

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.validate-tag.outputs.version }}"
          arch="${{ matrix.arch }}"
          out_dir="release"
          mkdir -p "${out_dir}"

          cp result/output.tar "${out_dir}/portabledesktop-v${version}-linux-${arch}-runtime.tar"
          cp result/manifest.json "${out_dir}/portabledesktop-v${version}-linux-${arch}-manifest.json"
          cp dist/portabledesktop "${out_dir}/portabledesktop-v${version}-linux-${arch}"
          chmod 0755 "${out_dir}/portabledesktop-v${version}-linux-${arch}"

          (
            cd "${out_dir}"
            sha256sum * > "SHA256SUMS-linux-${arch}.txt"
          )

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - publish-npm
      - build-release-artifacts
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            sha256sum * > SHA256SUMS.txt
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: v${{ needs.validate-tag.outputs.version }}
          generate_release_notes: true
          files: release/*
