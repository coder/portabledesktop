name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

env:
  BUN_VERSION: "1.3.2"

jobs:
  validate-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

  build-release-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            go_arch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            go_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pd/go.mod

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build.sh --package build

      - name: Build viewer JS
        run: make viewer

      - name: Build Go binary
        run: make embed build-linux-${{ matrix.go_arch }}

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail

          arch="${{ matrix.arch }}"
          out_dir="release"
          mkdir -p "${out_dir}"

          cp result/output.tar "${out_dir}/portabledesktop-linux-${arch}-runtime.tar"
          cp result/manifest.json "${out_dir}/portabledesktop-linux-${arch}-manifest.json"
          cp pd/dist/portabledesktop-linux-${{ matrix.go_arch }} "${out_dir}/portabledesktop-linux-${arch}"
          chmod 0755 "${out_dir}/portabledesktop-linux-${arch}"

          (
            cd "${out_dir}"
            sha256sum * > "SHA256SUMS-linux-${arch}.txt"
          )

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-release-artifacts
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            sha256sum * > SHA256SUMS.txt
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: v${{ needs.validate-tag.outputs.version }}
          generate_release_notes: true
          files: release/*
